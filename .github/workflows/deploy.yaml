name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Cache Quartz plugins
        uses: actions/cache@v6
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: ${{ runner.os }}-plugins-

      - run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Apply custom plugin patches
        run: |
          cp patches/folder-page/src/components/PageList.tsx .quartz/plugins/folder-page/src/components/PageList.tsx
          cd .quartz/plugins/folder-page && npm install && npm run build

      - name: Build
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
