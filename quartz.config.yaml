# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: "Studio Oswald"
  pageTitleSuffix: " — Archiv"
  enableSPA: true
  enablePopovers: false
  analytics: false
  locale: de-DE
  baseUrl: archive.studiooswald.com
  ignorePatterns:
    - .obsidian
    - "*.canvas"
    - Series
    - "Body of Work.md"
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: DM Sans
      body: Atkinson Hyperlegible Mono
      code: Atkinson Hyperlegible Mono
    colors:
      lightMode:
        light: "#F8F7F3"
        lightgray: "#E8E5DF"
        gray: "#a09890"
        darkgray: "#555"
        dark: "#000000"
        secondary: "#FF3A20"
        tertiary: "#202A25"
        highlight: "rgba(255,58,32,0.08)"
        textHighlight: "#FF3A2033"
      darkMode:
        light: "#202A25"
        lightgray: "#2e3b35"
        gray: "#4a5a53"
        darkgray: "#b0b8b4"
        dark: "#F8F7F3"
        secondary: "#FF3A20"
        tertiary: "#F8F7F3"
        highlight: "rgba(255,58,32,0.12)"
        textHighlight: "#FF3A2033"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: frontmatter
      priority:
        - frontmatter
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: false
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: false
    order: 50
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: false
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: false
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: false
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      folderDefaultState: open
      folderClickBehavior: link
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: false
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: false
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: false
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: false
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        Studio Oswald: https://studiooswald.com
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: Neueste Werke
      limit: 5
      showTags: false
    layout:
      position: right
      priority: 20
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: false
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - Year
        - Dimensions
        - Sold
        - Series
        - Credit
        - Location
        - Owner
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: true
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: false
    order: 900
  - source: github:quartz-community/stacked-pages
    enabled: true
    layout:
      position: afterBody
      priority: 50
      display: all
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
